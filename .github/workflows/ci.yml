name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts resolves DATABASE_URL eagerly, and npm ci's
      # postinstall step runs `prisma generate`, which loads that config —
      # so this needs to be set before npm ci runs, not just before any
      # actual db operation. Never touches a real dev.db/local.db.
      DATABASE_URL: "file:./ci-typecheck.db"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    env:
      # Same reasoning as typecheck: needed before npm ci for `prisma
      # generate` to load prisma.config.ts. The test script itself
      # re-exports this same value before actually using the database.
      DATABASE_URL: "file:./test.db"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    env:
      # Throwaway build-time database — matches the Dockerfile's own
      # build-stage approach. Never touches a real dev.db/local.db.
      DATABASE_URL: "file:./ci-build.db"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - name: Prepare database for build
        run: npm run db:push
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t dossier:ci .
